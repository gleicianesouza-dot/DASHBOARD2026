  <title>Dashboard de Saldo de Contas</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 20px;
      background: #f6f7fb;
      color: #0f172a;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    h1 {
      font-size: 20px;
      margin: 0;
    }
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    select, button {
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background: white;
      font-family: inherit;
    }
    button {
      cursor: pointer;
      background: #e2e8f0;
      transition: background 0.2s;
    }
    button:hover {
      background: #cbd5e1;
    }
    .kpis {
      display: flex;
      gap: 12px;
      margin: 18px 0;
    }
    .kpi {
      background: white;
      padding: 14px;
      border-radius: 10px;
      flex: 1;
      box-shadow: 0 6px 18px rgba(12,18,39,0.06);
    }
    .kpi h3 {
      margin: 0;
      font-size: 12px;
      color: #6b7280;
    }
    .kpi p {
      margin: 8px 0 0;
      font-size: 18px;
      font-weight: 700;
    }
    .charts {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 16px;
    }
    .card {
      background: white;
      padding: 14px;
      border-radius: 10px;
      box-shadow: 0 6px 18px rgba(12,18,39,0.06);
    }
    #tableWrap {
      margin-top: 12px;
      overflow: auto;
      max-height: 320px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid #e6e6e6;
      text-align: left;
    }
    th {
      background: #f8fafc;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    footer {
      margin-top: 20px;
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      padding-bottom: 20px;
    }
    @media(max-width:920px) { 
      .charts { grid-template-columns: 1fr; } 
      .controls { flex-direction: column; align-items: stretch; } 
      .kpis { flex-direction: column; } 
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Dashboard de Saldo de Contas — 06/04/2026 ➜ 31/12/2024</h1>
      <div class="controls">
        <label>Data:

        </label>
        <label>Conta:
          <select id="accountSelect"><option value="All">Todas</option></select>
        </label>
        <label>Tipo de Conta:

            <option value="CONTA CORRENTE">CONTA CORRENTE</option>
            <option value="CONTA INVESTIMENTO">CONTA INVESTIMENTO</option>
          </select>
        </label>
        <button id="resetBtn">Redefinir filtros</button>
      </div>
    </header>

    <section class="kpis">
      <div class="kpi">
        <h3>Saldo Selecionado (R$)</h3>

      </div>
      <div class="kpi">

      </div>
      <div class="kpi">

    </section>

    <div class="charts">
      <div class="card">

      </div>

      <div>

          <canvas id="barChart" height="200"></canvas>
        </div>
        <div class="card">
          <canvas id="pieChart" height="200"></canvas>
        </div>
      </div>
    </div>

// --- Utilitários ---
function fmtBR(value){
  if(value === null || value === undefined) return "R$ 0,00";
  return value.toLocaleString('pt-BR',{style:'currency', currency:'BRL'});
}
function unique(arr){ return Array.from(new Set(arr)); }

// --- Popula selects ---
const dateSelect = document.getElementById('dateSelect');
const accountSelect = document.getElementById('accountSelect');
const typeSelect = document.getElementById('typeSelect');

// Ordena datas da mais recente para a mais antiga (descendente)
const uniqueDates = unique(rawData.map(r=>r.date)).sort((a,b)=> new Date(b) - new Date(a));
uniqueDates.forEach(d=>{
  const opt = document.createElement('option');
  opt.value = d; 
  // Corrige problema de fuso horário adicionando T00:00:00 na conversão se necessário, 
  // mas como o formato é yyyy-mm-dd, ajustamos para exibir corretamente a data local.
  const [year, month, day] = d.split('-');
  opt.textContent = `${day}/${month}/${year}`;
  dateSelect.appendChild(opt);
});

const uniqueAccounts = unique(rawData.map(r=>r.account)).sort();
uniqueAccounts.forEach(a=>{
  const opt = document.createElement('option'); opt.value = a; opt.textContent = a; accountSelect.appendChild(opt);
});

// --- Charts setup ---
let lineChart, barChart, pieChart;
function createCharts(){
  const ctxL = document.getElementById('lineChart').getContext('2d');
  const ctxB = document.getElementById('barChart').getContext('2d');
  const ctxP = document.getElementById('pieChart').getContext('2d');

  lineChart = new Chart(ctxL, {
    type:'line',
    data:{ labels:[], datasets:[] },
    options:{
      responsive:true,
      plugins:{
        legend:{position:'bottom'},
        title: {display: true, text: 'Evolução do Saldo por Conta'}
      },
      interaction:{mode:'index', intersect:false},
      scales:{ y: { ticks: { callback: v => v.toLocaleString('pt-BR') } } }
    }
  });

  barChart = new Chart(ctxB, {
    type:'bar',
    data:{ labels:[], datasets:[{label:'Saldo (R$)', data:[], backgroundColor: '#3b82f6'}] },
    options:{
      indexAxis:'y',
      responsive:true,
      plugins:{
        legend:{display:false},
        title: {display: true, text: 'Ranking de Contas (Data Selecionada)'}
      },
      scales:{ x: { ticks: { callback: v => v.toLocaleString('pt-BR') } } }
    }
  });

  pieChart = new Chart(ctxP, {
    type:'doughnut',
    data:{ labels:[], datasets:[{data:[], backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4']}] },
    options:{ 
      responsive:true, 
      plugins:{
        legend:{position:'bottom'},
        title: {display: true, text: 'Distribuição por Tipo/Conta'}
      } 
    }
  });
}

// --- Filtragem e atualização de KPIs/Gráficos/Tabela ---
function filterData(){
  const date = dateSelect.value;
  const account = accountSelect.value;
  const type = typeSelect.value;
  return rawData.filter(r=>{
    if(date && r.date !== date) return false;
    if(account !== "All" && r.account !== account) return false;
    if(type !== "All" && r.type !== type) return false;
    return true;
  });
}

function updateKPIs(filtered){
  // Saldo selecionado = soma dos saldos do filtro
  const saldo = filtered.reduce((s,r)=> s + (Number(r.saldo)||0), 0);
  // Total por mês: se houver totalMes no filtro, usamos
  const tm = (filtered.find(r=>r.totalMes != null) || {}).totalMes || null;
  const tg = (filtered.find(r=>r.totalGeral != null) || {}).totalGeral || null;
  
  document.getElementById('kpiSaldo').textContent = fmtBR(saldo);
  document.getElementById('kpiTotalMes').textContent = fmtBR(tm);
  document.getElementById('kpiTotalGeral').textContent = fmtBR(tg);
}

function updateLineChart(){
  // O gráfico de linha exibe o histórico da conta selecionada (ou todas)
  const selectedAccount = accountSelect.value;
  const accountsToShow = selectedAccount === "All" ? uniqueAccounts : [selectedAccount];

  // Ordenar as datas de forma ascendente para o gráfico de linhas
  const datesAsc = [...uniqueDates].sort((a,b) => new Date(a) - new Date(b));
  
  lineChart.data.labels = datesAsc.map(d => {
    const [year, month, day] = d.split('-');
    return `${day}/${month}`;
  });

  lineChart.data.datasets = accountsToShow.map((acct, idx) => {
    const ds = datesAsc.map(dt=>{
      const rec = rawData.find(r=>r.date===dt && r.account===acct);
      return rec ? (Number(rec.saldo)||0) : 0;
    });
    
    // Gerar cores consistentes para as linhas baseadas no índice
    const hue = (idx * 137.508) % 360; 

    return {
      label: acct,
      data: ds,
      borderColor: `hsl(${hue}, 70%, 50%)`,
      backgroundColor: `hsl(${hue}, 70%, 50%, 0.5)`,
      borderWidth: 2,
      tension: 0.25,
      fill: false,
      pointRadius: 3
    };
  });

  lineChart.update();
}

function updateBarChart(){
  const date = dateSelect.value;
  const type = typeSelect.value;
  const filtered = rawData.filter(r=> r.date===date && (type==='All' || r.type===type));
  const sorted = filtered.slice().sort((a,b)=> b.saldo - a.saldo);
  
  barChart.data.labels = sorted.map(s=> s.account);
  barChart.data.datasets[0].data = sorted.map(s=> s.saldo);
  barChart.update();
}

function updatePieChart(){
  const date = dateSelect.value;
  const account = accountSelect.value;

  let dataAgg = {};
  if(account === "All"){
    // agregar por tipo se "Todas as contas"
    rawData.filter(r=> r.date===date).forEach(r=>{
      dataAgg[r.type] = (dataAgg[r.type] || 0) + (Number(r.saldo)||0);
    });
  } else {
    // agregar por tipo para a conta selecionada
    rawData.filter(r=> r.date===date && r.account===account).forEach(r=>{
      dataAgg[r.type] = (dataAgg[r.type] || 0) + (Number(r.saldo)||0);
    });
  }

  const labels = Object.keys(dataAgg);
  pieChart.data.labels = labels;
  pieChart.data.datasets[0].data = labels.map(l => dataAgg[l]);
  pieChart.update();
}

function renderTable(filtered){
  const wrap = document.getElementById('tableWrap');
  if(filtered.length === 0){ wrap.innerHTML = "<p style='padding:10px;'>Sem dados para os filtros selecionados.</p>"; return; }
  
  let html = `<table><thead><tr><th>DATA</th><th>CONTA</th><th>TIPO DE CONTA</th><th style="text-align:right">SALDO (R$)</th><th style="text-align:right">TOTAL POR MÊS (R$)</th><th style="text-align:right">TOTAL GERAL (R$)</th></tr></thead><tbody>`;
  
  filtered.forEach(r=>{
    const [year, month, day] = r.date.split('-');
    html += `<tr>
      <td>${day}/${month}/${year}</td>
      <td>${r.account}</td>
      <td>${r.type}</td>
      <td style="text-align:right; font-weight:600">${fmtBR(r.saldo)}</td>
      <td style="text-align:right; color:#6b7280">${fmtBR(r.totalMes)}</td>
      <td style="text-align:right; color:#6b7280">${fmtBR(r.totalGeral)}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  wrap.innerHTML = html;
}

function refreshAll(){
  const filtered = filterData();
  updateKPIs(filtered);
  updateLineChart();
  updateBarChart();
  updatePieChart();
  renderTable(filtered);
}

// --- Events ---
dateSelect.addEventListener('change', refreshAll);
accountSelect.addEventListener('change', refreshAll);
typeSelect.addEventListener('change', refreshAll);

document.getElementById('resetBtn').addEventListener('click', ()=>{
  dateSelect.value = uniqueDates[0];
  accountSelect.value = "All";
  typeSelect.value = "All";
  refreshAll();
});

// --- Inicialização ---
createCharts();
// set defaults (data mais recente)
dateSelect.value = uniqueDates[0];
typeSelect.value = "All";
accountSelect.value = "All";
refreshAll();

</script>
