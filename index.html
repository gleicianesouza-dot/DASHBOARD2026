<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro Pro</title>
    <!-- Plotly para os gráficos -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <!-- Tailwind CSS para estilização rápida e moderna -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Cabeçalho e Filtros -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                    📊 Saldo de Contas
                </h2>
                <p class="text-slate-500 text-sm mt-1">Acompanhamento de saldos e evolução financeira</p>
            </div>

            <div class="flex flex-col sm:flex-row gap-4 w-full md:w-auto">
                <div class="flex flex-col w-full sm:w-48">
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Conta</label>
                    <select id="filtroConta" class="bg-slate-50 border border-slate-200 text-slate-700 rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 outline-none transition-colors">
                        <option value="TODAS">Todas as Contas</option>
                    </select>
                </div>

                <div class="flex flex-col w-full sm:w-48">
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Tipo de Conta</label>
                    <select id="filtroTipo" class="bg-slate-50 border border-slate-200 text-slate-700 rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 outline-none transition-colors">
                        <option value="TODOS">Todos os Tipos</option>
                        <option value="CONTA CORRENTE">Conta Corrente</option>
                        <option value="CONTA INVESTIMENTO">Investimento</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- KPI Card -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-xl shadow-md p-6 text-white flex flex-col justify-center">
            <h3 class="text-blue-100 text-sm font-semibold uppercase tracking-wider mb-1">Saldo Total Consolidado</h3>
            <div id="saldoValor" class="text-4xl md:text-5xl font-bold tracking-tight">R$ 0,00</div>
        </div>

        <!-- Gráficos -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                <div id="linha" class="w-full h-80"></div>
            </div>
            
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                <div id="ranking" class="w-full h-80"></div>
            </div>
        </div>

    </div>

<script>
// ============================
// BASE DE DADOS EXPANDIDA
// Adicionei dados de meses anteriores para o gráfico de linha fazer sentido
// ============================
const dados = [
    {data:"2026-01", conta:"CETAM", tipo:"CONTA CORRENTE", saldo:600000.00},
    {data:"2026-01", conta:"PRODAM", tipo:"CONTA CORRENTE", saldo:610000.00},
    {data:"2026-01", conta:"SAFRA", tipo:"CONTA INVESTIMENTO", saldo:3500000.00},
    
    {data:"2026-02", conta:"CETAM", tipo:"CONTA CORRENTE", saldo:625000.00},
    {data:"2026-02", conta:"PRODAM", tipo:"CONTA CORRENTE", saldo:630000.00},
    {data:"2026-02", conta:"SAFRA", tipo:"CONTA INVESTIMENTO", saldo:3650000.00},

    {data:"2026-03", conta:"CETAM", tipo:"CONTA CORRENTE", saldo:655183.91},
    {data:"2026-03", conta:"PRODAM", tipo:"CONTA CORRENTE", saldo:648845.01},
    {data:"2026-03", conta:"MOVIMENTO", tipo:"CONTA CORRENTE", saldo:42463.06},
    {data:"2026-03", conta:"SAFRA", tipo:"CONTA CORRENTE", saldo:335.67},
    {data:"2026-03", conta:"WALLETZ MATRIZ", tipo:"CONTA CORRENTE", saldo:49.56},
    {data:"2026-03", conta:"WALLETZ SJC", tipo:"CONTA CORRENTE", saldo:179.01},
    {data:"2026-03", conta:"SAFRA", tipo:"CONTA INVESTIMENTO", saldo:3763812.43}
];

// ============================
// POPULAR FILTRO
// ============================
const contasUnicas = [...new Set(dados.map(d => d.conta))].sort();
const selectConta = document.getElementById("filtroConta");

contasUnicas.forEach(c => {
    let op = document.createElement("option");
    op.value = c;
    op.text = c;
    selectConta.appendChild(op);
});

// Formatador de Moeda BRL
const formatarMoeda = (valor) => {
    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(valor);
};

// ============================
// FUNÇÃO PRINCIPAL DE ATUALIZAÇÃO
// ============================
function atualizar() {
    let contaSel = document.getElementById("filtroConta").value;
    let tipoSel = document.getElementById("filtroTipo").value;

    let filtrado = dados.filter(d => {
        return (contaSel === "TODAS" || d.conta === contaSel) &&
               (tipoSel === "TODOS" || d.tipo === tipoSel);
    });

    // --- 1. ATUALIZAR KPI ---
    let total = filtrado.reduce((s, d) => s + d.saldo, 0);
    document.getElementById("saldoValor").innerText = formatarMoeda(total);

    // --- 2. GRÁFICO DE LINHA (Evolução) ---
    let datas = [...new Set(filtrado.map(d => d.data))].sort();
    let valoresLinha = datas.map(dt => 
        filtrado.filter(d => d.data === dt).reduce((s,d) => s + d.saldo, 0)
    );

    let layoutLinha = {
        title: { text: 'Evolução do Saldo', font: { family: 'Inter, sans-serif', size: 16, color: '#334155' } },
        margin: { t: 40, b: 40, l: 60, r: 20 },
        paper_bgcolor: 'transparent',
        plot_bgcolor: 'transparent',
        xaxis: { showgrid: false, color: '#64748b' },
        yaxis: { gridcolor: '#e2e8f0', color: '#64748b', tickprefix: 'R$ ' }
    };

    Plotly.newPlot('linha', [{
        x: datas,
        y: valoresLinha,
        type: 'scatter',
        mode: 'lines+markers',
        line: { color: '#3b82f6', width: 3, shape: 'spline' },
        marker: { size: 8, color: '#2563eb' },
        fill: 'tozeroy',
        fillcolor: 'rgba(59, 130, 246, 0.1)'
    }], layoutLinha, {responsive: true, displayModeBar: false});

    // --- 3. GRÁFICO DE RANKING (Barras Horizontais Ordenadas) ---
    let rankingMap = {};
    filtrado.forEach(d => {
        rankingMap[d.conta] = (rankingMap[d.conta] || 0) + d.saldo;
    });

    let rankingArray = Object.keys(rankingMap)
        .map(key => ({ conta: key, saldo: rankingMap[key] }))
        .sort((a, b) => a.saldo - b.saldo); // Ordena de forma crescente para o gráfico de barras ficar correto

    let layoutRanking = {
        title: { text: 'Ranking por Conta', font: { family: 'Inter, sans-serif', size: 16, color: '#334155' } },
        margin: { t: 40, b: 40, l: 110, r: 20 },
        paper_bgcolor: 'transparent',
        plot_bgcolor: 'transparent',
        xaxis: { gridcolor: '#e2e8f0', color: '#64748b' },
        yaxis: { color: '#475569', font: { weight: 'bold' } }
    };

    Plotly.newPlot('ranking', [{
        x: rankingArray.map(r => r.saldo),
        y: rankingArray.map(r => r.conta),
        type: 'bar',
        orientation: 'h',
        marker: { 
            color: '#10b981',
            borderRadius: 4
        },
        text: rankingArray.map(r => formatarMoeda(r.saldo)),
        textposition: 'auto',
        hoverinfo: 'none'
    }], layoutRanking, {responsive: true, displayModeBar: false});
}

// EVENTOS
document.getElementById("filtroConta").addEventListener("change", atualizar);
document.getElementById("filtroTipo").addEventListener("change", atualizar);

// INICIAL
atualizar();

// Redimensionar gráficos se a janela mudar de tamanho
window.addEventListener('resize', () => {
    Plotly.Plots.resize('linha');
    Plotly.Plots.resize('ranking');
});

</script>
</body>
</html>
