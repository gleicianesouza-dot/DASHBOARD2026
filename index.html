<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Dashboard de Saldo de Contas</title>
  
  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    :root {
      --bg-color: #f8fafc;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --card-bg: #ffffff;
      --border-color: #e2e8f0;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 24px;
      background: var(--bg-color);
      color: var(--text-main);
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
    }

    /* Cabeçalho e Filtros */
    header {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }
    
    @media(min-width: 768px) {
      header {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.025em;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .control-group label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    select, button {
      padding: 10px 14px;
      font-size: 14px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--card-bg);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all 0.2s;
    }

    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    button {
      background: var(--primary);
      color: white;
      border: none;
      font-weight: 500;
      cursor: pointer;
      height: 42px; /* Alinha com os selects */
    }

    button:hover {
      background: var(--primary-hover);
    }

    /* Cards de KPI */
    .kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .kpi {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .kpi h3 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .kpi p {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      color: var(--text-main);
    }

    /* Gráficos */
    .charts {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    
    @media(min-width: 1024px) {
      .charts {
        grid-template-columns: 2fr 1fr;
      }
    }

    .card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
    }

    .card h3 {
      margin: 0 0 16px 0;
      font-size: 16px;
      font-weight: 600;
    }

    .side-charts {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Tabela */
    #tableWrap {
      overflow-x: auto;
      max-height: 400px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      text-align: left;
    }

    thead th {
      background: #f1f5f9;
      padding: 12px 16px;
      font-weight: 600;
      color: var(--text-muted);
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--border-color);
      white-space: nowrap;
    }

    tbody td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-main);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    tbody tr:hover {
      background-color: #f8fafc;
    }

    /* Footer */
    footer {
      margin-top: 32px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Dashboard de Saldo de Contas</h1>
      <div class="controls">
        <div class="control-group">
          <label for="dateSelect">Data</label>
          <select id="dateSelect"></select>
        </div>
        <div class="control-group">
          <label for="accountSelect">Conta</label>
          <select id="accountSelect"><option value="All">Todas</option></select>
        </div>
        <div class="control-group">
          <label for="typeSelect">Tipo de Conta</label>
          <select id="typeSelect">
            <option value="All">Todos</option>
            <option value="CONTA CORRENTE">CONTA CORRENTE</option>
            <option value="CONTA INVESTIMENTO">CONTA INVESTIMENTO</option>
          </select>
        </div>
        <button id="resetBtn">Redefinir Filtros</button>
      </div>
    </header>

    <section class="kpis">
      <div class="kpi">
        <h3>Saldo Selecionado</h3>
        <p id="kpiSaldo">R$ 0,00</p>
      </div>
      <div class="kpi">
        <h3>Total por Mês</h3>
        <p id="kpiTotalMes">R$ 0,00</p>
      </div>
      <div class="kpi">
        <h3>Total Geral</h3>
        <p id="kpiTotalGeral">R$ 0,00</p>
      </div>
    </section>

    <div class="charts">
      <div class="card">
        <h3>Evolução do Saldo</h3>
        <div style="position: relative; height: 100%; min-height: 300px;">
          <canvas id="lineChart"></canvas>
        </div>
      </div>

      <div class="side-charts">
        <div class="card">
          <h3>Ranking de Saldos</h3>
          <div style="position: relative; height: 200px;">
            <canvas id="barChart"></canvas>
          </div>
        </div>
        <div class="card">
          <h3>Distribuição por Tipo/Conta</h3>
          <div style="position: relative; height: 200px;">
            <canvas id="pieChart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>Detalhamento de Dados</h3>
      <div id="tableWrap"></div>
    </div>

    <footer>Dados fictícios — amostra fornecida. Desenvolvido automaticamente.</footer>
  </div>

// --- Paleta de Cores ---
const chartColors = [
  '#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', 
  '#ec4899', '#06b6d4', '#14b8a6', '#f97316', '#6366f1',
  '#84cc16', '#eab308'
];

// --- Utilitários ---
function fmtBR(value){
  if(value === null || value === undefined) return "R$ 0,00";
  return value.toLocaleString('pt-BR',{style:'currency', currency:'BRL'});
}

function unique(arr){ return Array.from(new Set(arr)); }

// Parse Date safe (evita fuso horário adiantando/atrasando dia)
function parseDateSafe(dateString) {
  return new Date(dateString + 'T00:00:00');
}

// --- Popula selects ---
const dateSelect = document.getElementById('dateSelect');
const accountSelect = document.getElementById('accountSelect');
const typeSelect = document.getElementById('typeSelect');

const uniqueDates = unique(rawData.map(r=>r.date)).sort((a,b)=> new Date(a) - new Date(b));
// Popula dropdown de datas (inverso - mais nova primeiro visualmente)
[...uniqueDates].reverse().forEach(d=>{
  const opt = document.createElement('option');
  opt.value = d; 
  opt.textContent = parseDateSafe(d).toLocaleDateString('pt-BR');
  dateSelect.appendChild(opt);
});

const uniqueAccounts = unique(rawData.map(r=>r.account)).sort();
uniqueAccounts.forEach(a=>{
  const opt = document.createElement('option'); 
  opt.value = a; 
  opt.textContent = a; 
  accountSelect.appendChild(opt);
});

// --- Charts setup ---
let lineChart, barChart, pieChart;
function createCharts(){
  const ctxL = document.getElementById('lineChart').getContext('2d');
  const ctxB = document.getElementById('barChart').getContext('2d');
  const ctxP = document.getElementById('pieChart').getContext('2d');

  lineChart = new Chart(ctxL, {
    type:'line',
    data:{ labels:[], datasets:[] },
    options:{
      responsive:true,
      maintainAspectRatio: false,
      plugins:{
        legend:{position:'bottom', labels: { usePointStyle: true, boxWidth: 8 }}
      },
      interaction:{mode:'index', intersect:false},
      scales:{ y: { ticks: { callback: v => 'R$ ' + v.toLocaleString('pt-BR') } } }
    }
  });

  barChart = new Chart(ctxB, {
    type:'bar',
    data:{ labels:[], datasets:[{label:'Saldo (R$)', data:[], backgroundColor: chartColors}] },
    options:{
      indexAxis:'y',
      responsive:true,
      maintainAspectRatio: false,
      plugins:{legend:{display:false}},
      scales:{ x: { ticks: { callback: v => v.toLocaleString('pt-BR') } } }
    }
  });

  pieChart = new Chart(ctxP, {
    type:'doughnut', // Mudado para doughnut para um visual mais clean
    data:{ labels:[], datasets:[{data:[], backgroundColor: chartColors, borderWidth: 0}] },
    options:{ 
      responsive:true, 
      maintainAspectRatio: false,
      plugins:{legend:{position:'bottom', labels: { usePointStyle: true, boxWidth: 8 }}} 
    }
  });
}

// --- Filtragem e atualização de KPIs/Gráficos/Tabela ---
function filterData(){
  const date = dateSelect.value;
  const account = accountSelect.value;
  const type = typeSelect.value;
  return rawData.filter(r=>{
    if(date && r.date !== date) return false;
    if(account !== "All" && r.account !== account) return false;
    if(type !== "All" && r.type !== type) return false;
    return true;
  });
}

function updateKPIs(filtered){
  const saldo = filtered.reduce((s,r)=> s + (Number(r.saldo)||0), 0);
  const tm = (filtered.find(r=>r.totalMes != null) || {}).totalMes || null;
  const tg = (filtered.find(r=>r.totalGeral != null) || {}).totalGeral || null;
  
  document.getElementById('kpiSaldo').textContent = fmtBR(saldo);
  document.getElementById('kpiTotalMes').textContent = fmtBR(tm);
  document.getElementById('kpiTotalGeral').textContent = fmtBR(tg);
}

function updateLineChart(){
  const selectedAccount = accountSelect.value;
  const accountsToShow = selectedAccount === "All" ? uniqueAccounts : [selectedAccount];
  const dates = uniqueDates.slice(); 
  
  lineChart.data.labels = dates.map(d=> parseDateSafe(d).toLocaleDateString('pt-BR'));
  lineChart.data.datasets = accountsToShow.map((acct, idx) => {
    const ds = dates.map(dt=>{
      const rec = rawData.find(r=>r.date===dt && r.account===acct);
      return rec ? (Number(rec.saldo)||0) : 0;
    });
    return {
      label: acct,
      data: ds,
      borderColor: chartColors[idx % chartColors.length],
      backgroundColor: chartColors[idx % chartColors.length],
      borderWidth: 2,
      pointRadius: 3,
      tension: 0.3, // Curvas mais suaves
      fill: false
    };
  });
  lineChart.update();
}

function updateBarChart(){
  const date = dateSelect.value;
  const type = typeSelect.value;
  const filtered = rawData.filter(r=> r.date===date && (type==='All' || r.type===type));
  const sorted = filtered.slice().sort((a,b)=> b.saldo - a.saldo).slice(0, 8); // Top 8 para não amontoar
  
  barChart.data.labels = sorted.map(s=> s.account);
  barChart.data.datasets[0].data = sorted.map(s=> s.saldo);
  barChart.update();
}

function updatePieChart(){
  const date = dateSelect.value;
  const account = accountSelect.value;

  let dataAgg = {};
  if(account === "All"){
    rawData.filter(r=> r.date===date).forEach(r=>{
      dataAgg[r.type] = (dataAgg[r.type] || 0) + (Number(r.saldo)||0);
    });
  } else {
    rawData.filter(r=> r.date===date && r.account===account).forEach(r=>{
      dataAgg[r.type] = (dataAgg[r.type] || 0) + (Number(r.saldo)||0);
    });
  }

  const labels = Object.keys(dataAgg);
  pieChart.data.labels = labels;
  pieChart.data.datasets[0].data = labels.map(l => dataAgg[l]);
  pieChart.update();
}

function renderTable(filtered){
  const wrap = document.getElementById('tableWrap');
  if(filtered.length === 0){ 
    wrap.innerHTML = "<p style='padding:16px'>Sem dados para os filtros selecionados.</p>"; 
    return; 
  }
  
  let html = `<table><thead><tr>
    <th>Data</th>
    <th>Conta</th>
    <th>Tipo de Conta</th>
    <th style="text-align:right">Saldo</th>
    <th style="text-align:right">Total/Mês</th>
    <th style="text-align:right">Total Geral</th>
  </tr></thead><tbody>`;
  
  filtered.forEach(r=>{
    html += `<tr>
      <td>${parseDateSafe(r.date).toLocaleDateString('pt-BR')}</td>
      <td style="font-weight: 500">${r.account}</td>
      <td><span style="font-size: 12px; background: #e2e8f0; padding: 2px 6px; border-radius: 4px;">${r.type}</span></td>
      <td style="text-align:right; font-weight: 500">${fmtBR(r.saldo)}</td>
      <td style="text-align:right; color: #64748b">${fmtBR(r.totalMes)}</td>
      <td style="text-align:right; color: #64748b">${fmtBR(r.totalGeral)}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  wrap.innerHTML = html;
}

function refreshAll(){
  const filtered = filterData();
  updateKPIs(filtered);
  updateLineChart();
  updateBarChart();
  updatePieChart();
  renderTable(filtered);
}

// --- Events ---
dateSelect.addEventListener('change', refreshAll);
accountSelect.addEventListener('change', refreshAll);
typeSelect.addEventListener('change', refreshAll);

document.getElementById('resetBtn').addEventListener('click', ()=>{
  // Retorna para a data MAIS RECENTE
  dateSelect.value = uniqueDates[uniqueDates.length - 1];
  accountSelect.value = "All";
  typeSelect.value = "All";
  refreshAll();
});

// --- Inicialização ---
createCharts();

// Define defaults: A data MAIS RECENTE ao invés da mais antiga
dateSelect.value = uniqueDates[uniqueDates.length - 1];
typeSelect.value = "All";
accountSelect.value = "All";
refreshAll();

</script>
